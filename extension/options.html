<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>acrawl Bridge Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #save {
      background-color: #0066cc;
      color: white;
    }
    #save:hover {
      background-color: #0052a3;
    }
    #test {
      background-color: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }
    #test:hover {
      background-color: #e0e0e0;
    }
    #status {
      display: block;
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
      background-color: #fff;
      border: 1px solid #ddd;
      color: #666;
    }
    #status.connected {
      background-color: #e6f7e6;
      border-color: #4caf50;
      color: #2e7d32;
    }
    #status.disconnected {
      background-color: #ffe6e6;
      border-color: #f44336;
      color: #c62828;
    }
    #status.testing {
      background-color: #fff3e0;
      border-color: #ff9800;
      color: #e65100;
    }
  </style>
</head>
<body>
  <h1>acrawl Bridge</h1>
  
  <div class="form-group">
    <label for="port">WebSocket Port</label>
    <input id="port" type="number" value="19876" min="1" max="65535">
  </div>
  
  <div class="form-group">
    <label for="token">Authentication Token</label>
    <input id="token" type="password" placeholder="Paste token from acrawl /extension command">
  </div>
  
  <div class="button-group">
    <button id="save">Save</button>
    <button id="test">Test Connection</button>
  </div>
  
  <span id="status">Disconnected</span>
  
  <script src="options.js"></script>
</body>
</html>
