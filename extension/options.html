<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>acrawl Bridge Options</title>
  <style>
    :root {
      color-scheme: light;
    }
    html {
      width: 520px;
      min-width: 520px;
      background: #eef2f7;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 520px;
      min-width: 520px;
      margin: 0;
      padding: 16px;
      background: #eef2f7;
      box-sizing: border-box;
      color: #1f2937;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #d8e0ea;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      padding: 18px;
    }
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 {
      color: #1f2937;
      font-size: 18px;
      line-height: 1.2;
      margin: 0;
    }
    .subtitle {
      margin-top: 4px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.4;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 14px;
      align-items: end;
    }
    .form-group {
      margin: 0;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #475569;
      font-weight: 500;
      font-size: 12px;
    }
    input {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .help-text {
      margin-top: 12px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
    }
    button {
      flex: 1;
      min-height: 42px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }
    #save {
      background-color: #2563eb;
      color: white;
    }
    #save:hover {
      background-color: #1d4ed8;
    }
    #test {
      background-color: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    #test:hover {
      background-color: #f1f5f9;
    }
    #status {
      display: block;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      background-color: #fff;
      border: 1px solid #cbd5e1;
      color: #475569;
    }
    #status.connected {
      background-color: #e6f7e6;
      border-color: #4caf50;
      color: #2e7d32;
    }
    #status.disconnected {
      background-color: #ffe6e6;
      border-color: #f44336;
      color: #c62828;
    }
    #status.testing {
      background-color: #fff3e0;
      border-color: #ff9800;
      color: #e65100;
    }
    @media (max-width: 540px) {
      html, body {
        width: 100%;
        min-width: 0;
      }
      .settings-grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div>
        <h1>acrawl Bridge</h1>
        <div class="subtitle">Save connects the extension. Test Connection only checks the local bridge server.</div>
      </div>
    </div>

    <div class="settings-grid">
      <div class="form-group">
        <label for="port">WebSocket Port</label>
        <input id="port" type="number" value="19876" min="1" max="65535">
      </div>

      <div class="form-group">
        <label for="token">Authentication Token</label>
        <input id="token" type="password" placeholder="Paste token from acrawl /extension command">
      </div>
    </div>

    <div class="button-group">
      <button id="save">Save</button>
      <button id="test">Test Connection</button>
    </div>

    <div class="help-text">
      Tip: run <code>/extension</code> in acrawl first, then paste the shown token here once.
    </div>

    <span id="status">Disconnected</span>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
