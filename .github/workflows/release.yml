name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: acrawl-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: acrawl-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: acrawl-macos-x64
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: acrawl-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: acrawl-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cmake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install cmake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake -y

      - name: Set build date
        shell: bash
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
          GIT_SHA: ${{ github.sha }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/acrawl

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/acrawl

      - name: Rename binary (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: cp target/${{ matrix.target }}/release/acrawl ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item "target/${{ matrix.target }}/release/acrawl.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  test-transcription:
    name: Test transcription feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cmake and build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Test acrawl-processing with transcription feature
        run: cargo check -p acrawl-processing --features transcription

  release:
    name: Create Release
    needs: [build, test-transcription]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            CHANGELOG.md
            extension
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build extension zip
        working-directory: extension
        run: |
          zip -r ../acrawl-extension.zip \
            manifest.json \
            background.js \
            options.html \
            options.js \
            icons \
            commands

      - name: Collect binaries
        run: |
          mkdir release
          cp artifacts/acrawl-linux-x64/acrawl-linux-x64 release/
          cp artifacts/acrawl-linux-arm64/acrawl-linux-arm64 release/
          cp artifacts/acrawl-macos-x64/acrawl-macos-x64 release/
          cp artifacts/acrawl-macos-arm64/acrawl-macos-arm64 release/
          cp artifacts/acrawl-windows-x64.exe/acrawl-windows-x64.exe release/
          cp acrawl-extension.zip release/

      - name: Generate checksums
        working-directory: release
        run: sha256sum acrawl-linux-x64 acrawl-linux-arm64 acrawl-macos-x64 acrawl-macos-arm64 acrawl-windows-x64.exe acrawl-extension.zip > checksums.sha256

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between `## [VERSION]` and the next `## [...]`.
          # Pass VERSION via -v so its characters are treated literally — embedding
          # it inside the awk pattern would let regex metacharacters in a tag
          # name break or silently broaden the match.
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { header = "## [" ver "]" }
            index($0, header) == 1 { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "body<<RELEASE_EOF"
            echo "$NOTES"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            release/acrawl-linux-x64
            release/acrawl-linux-arm64
            release/acrawl-macos-x64
            release/acrawl-macos-arm64
            release/acrawl-windows-x64.exe
            release/acrawl-extension.zip
            release/checksums.sha256
